<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<title>Français B2 — TEF 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b; --bg2:#111113; --bg3:#18181b; --bg4:#1e1e23;
  --border:#27272a; --border2:#3f3f46;
  --text:#fafafa; --text2:#a1a1aa; --text3:#52525b;
  --green:#22c55e; --green-bg:#052e16; --green-br:#14532d;
  --blue:#3b82f6; --blue-bg:#0c1d3e; --blue-br:#1e3a6e;
  --amber:#f59e0b; --amber-bg:#2d1b04; --amber-br:#92400e;
  --purple:#8b5cf6; --purple-bg:#1e0a3c; --purple-br:#5b21b6;
  --rose:#f43f5e; --rose-bg:#2d0a14; --rose-br:#9f1239;
  --teal:#14b8a6; --teal-bg:#0a2622; --teal-br:#0f766e;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:calc(64px + var(--safe-bottom));overflow-x:hidden;}

/* ── BOTTOM NAV (mobile-first) ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  padding-bottom:var(--safe-bottom);
  z-index:200;height:calc(56px + var(--safe-bottom));
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;color:var(--text3);
  font-size:9px;font-family:'DM Sans',sans-serif;cursor:pointer;
  padding:6px 2px;transition:color 0.15s;letter-spacing:0.03em;
  text-transform:uppercase;font-weight:600;
}
.bn:hover,.bn.active{color:var(--green);}
.bn-ic{font-size:18px;line-height:1;}

/* ── HEADER ── */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 16px;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);}
.hdr-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.hdr-right{display:flex;gap:6px;align-items:center;}

/* ── PAGES ── */
.page{display:none;padding:16px;max-width:680px;margin:0 auto;animation:fadeIn 0.2s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ── TYPOGRAPHY ── */
.pg-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:2px;}
.pg-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.14em;margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.card+.card{margin-top:8px;}

/* ── STAT GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.sgrid.s2{grid-template-columns:repeat(2,1fr);}
.sgrid.s4{grid-template-columns:repeat(4,1fr);}
.sgrid.s5{grid-template-columns:repeat(5,1fr);}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;}
.sv{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1;margin-bottom:3px;}
.sl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;}

/* ── PROGRESS BAR ── */
.pb-w{margin-bottom:12px;}
.pb-h{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px;}
.pb-bg{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden;}
.pb-f{height:100%;border-radius:3px;background:var(--green);transition:width 0.4s;}

/* ── BUTTONS ── */
.btn-g{padding:10px 18px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;border:none;border-radius:8px;cursor:pointer;letter-spacing:0.03em;transition:opacity 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-g:hover{opacity:0.85;}
.btn-g:active{opacity:0.7;}
.btn-s{padding:9px 16px;background:var(--bg3);color:var(--text2);font-size:12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-s:hover{background:var(--bg4);color:var(--text);}
.btn-s:active{opacity:0.7;}
.btn-r{padding:9px 16px;background:var(--rose-bg);color:var(--rose);font-size:12px;border:1px solid var(--rose-br);border-radius:8px;cursor:pointer;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn-full{width:100%;text-align:center;justify-content:center;}

/* ── FORM ELEMENTS ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.flbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.09em;}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;width:100%;transition:border-color 0.15s;-webkit-appearance:none;}
.fi:focus{border-color:var(--green);}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none;cursor:pointer;}
.fta{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;width:100%;resize:vertical;min-height:100px;line-height:1.7;}
.fta:focus{border-color:var(--green);}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:400px){.fgrid2{grid-template-columns:1fr;}}

/* ── BADGES ── */
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;}

/* ── LIST ITEMS ── */
.list-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.li-main{flex:1;min-width:0;}
.li-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.li-right{display:flex;gap:5px;flex-shrink:0;}
.icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;color:var(--text2);}
.icon-btn:hover{color:var(--text);}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:none;align-items:flex-end;justify-content:center;padding:0;}
.ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));width:100%;max-height:90vh;overflow-y:auto;}
.modal-bar{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-ttl{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:14px;}

/* ── CHIP ROW ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0;}
.chip{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--bg4);color:var(--text3);border:1px solid var(--border);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 16px;color:var(--text3);}
.empty-ic{font-size:36px;margin-bottom:8px;}
.empty-txt{font-size:13px;}
.empty-sub{font-size:11px;margin-top:4px;}

/* ── TOGGLE / CHECKBOX ── */
.toggle{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}

/* ── HOME SPECIFIC ── */
.home-hero{background:linear-gradient(135deg,var(--green-bg),var(--blue-bg));border:1px solid var(--green-br);border-radius:14px;padding:18px;margin-bottom:16px;}
.home-hero h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--green);margin-bottom:4px;}
.home-hero p{font-size:12px;color:var(--text2);line-height:1.6;}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all 0.15s;text-align:center;}
.tool-card:hover,.tool-card:active{border-color:var(--border2);transform:scale(0.98);}
.tool-ic{font-size:24px;margin-bottom:6px;}
.tool-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
.tool-desc{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── FLASHCARD ── */
.fc-wrap{perspective:1000px;cursor:pointer;margin:0 auto 16px;max-width:500px;}
.fc-inner{position:relative;height:220px;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.fc-front{background:var(--bg2);border:1px solid var(--border2);}
.fc-back{background:var(--bg3);border:1px solid var(--green-br);transform:rotateY(180deg);}
.fc-hint{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;}
.fc-word{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
.fc-ans{font-family:'Lora',serif;font-size:22px;color:var(--green);font-weight:600;margin-bottom:6px;}
.fc-ex{font-size:12px;color:var(--text2);font-style:italic;line-height:1.6;}
.fc-tap{font-size:10px;color:var(--text3);margin-top:12px;}
.rating-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:500px;margin:0 auto;}
.rb{padding:10px 4px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s;}
.rb:active{transform:scale(0.95);}
.rb-again:hover,.rb-again:active{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-br);}
.rb-hard:hover,.rb-hard:active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-br);}
.rb-good:hover,.rb-good:active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-br);}
.rb-easy:hover,.rb-easy:active{background:var(--green-bg);color:var(--green);border-color:var(--green-br);}
.rb-lbl{font-size:12px;margin-bottom:2px;}
.rb-int{font-size:9px;font-weight:400;color:var(--text3);}

/* ── WRITING ── */
.writing-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.wc{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--green);}
.writing-entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.we-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.we-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.we-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.we-content{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;max-height:120px;overflow:hidden;position:relative;}
.we-content.expanded{max-height:none;}
.we-fade{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--bg2));}

/* ── HABIT TRACKER ── */
.habit-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;}
.habit-ic{font-size:20px;flex-shrink:0;}
.habit-main{flex:1;}
.habit-name{font-size:13px;font-weight:600;color:var(--text);}
.habit-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.streak-dots{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);}
.dot.done{background:var(--green);border-color:var(--green-br);}
.dot.today{border:2px solid var(--amber);}

/* ── TEF MOCK SCORER ── */
.tef-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;}
.tef-sec-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;}
.tef-sec-sub{font-size:11px;color:var(--text2);margin-bottom:10px;}
.score-display{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;text-align:center;padding:8px;}
.level-badge{text-align:center;margin-top:4px;}

/* ── LISTENING LOG ── */
.log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;}
.le-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.le-title{font-size:13px;font-weight:600;color:var(--text);}
.le-meta{font-size:10px;color:var(--text3);}
.le-pct{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--blue);}

/* ── SPEAKING LOG ── */
.sp-entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;}

/* ── GRAMMAR REF ── */
.gram-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;cursor:pointer;}
.gram-item.open{border-color:var(--blue-br);}
.gram-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
.gram-cat{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--blue-bg);color:var(--blue);font-weight:600;}
.gram-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.gram-item.open .gram-body{display:block;}
.gram-rule{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:8px;}
.gram-example{background:var(--bg3);border-radius:6px;padding:8px 10px;font-family:'Lora',serif;font-size:13px;color:var(--green);margin-bottom:6px;font-style:italic;}
.gram-note{font-size:11px;color:var(--text3);line-height:1.5;}

/* ── SEARCH ── */
.search-box{position:relative;margin-bottom:12px;}
.search-box input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px 10px 34px;outline:none;font-family:'DM Sans',sans-serif;}
.search-box input:focus{border-color:var(--green);}
.search-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);}

/* ── WEEK CARDS ── */
.week-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;}
.week-card.current{border-color:var(--blue-br);}
.week-card.done{border-color:var(--green-br);}
.wk-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.wk-num{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;background:var(--bg3);color:var(--text2);flex-shrink:0;}
.wk-info{flex:1;min-width:0;}
.wk-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wk-dates{font-size:10px;color:var(--text3);margin-top:1px;}
.wk-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0;}
.wk-chev{color:var(--text3);font-size:10px;transition:transform 0.2s;flex-shrink:0;}
.wk-chev.open{transform:rotate(180deg);}
.wk-body{border-top:1px solid var(--border);padding:12px;display:none;}
.wk-body.open{display:block;}
.day-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:5px;font-size:12px;}
.day-nm{font-weight:700;color:var(--text);width:30px;flex-shrink:0;padding-top:1px;}
.day-task{color:var(--text2);flex:1;line-height:1.5;}
.day-dur{color:var(--text3);font-size:10px;flex-shrink:0;padding-top:2px;}
.hrs-slider{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:8px;padding:9px 12px;margin-bottom:8px;}
.hrs-slider label{font-size:11px;color:var(--text2);white-space:nowrap;}
.hrs-slider input[type=range]{flex:1;accent-color:var(--green);}
.hrs-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--green);min-width:32px;}

/* ── TEF SCORE CHART ── */
.score-history{overflow-x:auto;}
.score-table{width:100%;border-collapse:collapse;font-size:12px;}
.score-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg3);}
.score-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
.score-table tr:last-child td{border-bottom:none;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<!-- PAGES -->
<div id="pg-home" class="page active"></div>
<div id="pg-tracker" class="page"></div>
<div id="pg-cards" class="page"></div>
<div id="pg-tools" class="page"></div>
<div id="pg-settings" class="page"></div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="bn active" onclick="nav('home')" id="bn-home"><div class="bn-ic">🏠</div>Home</button>
  <button class="bn" onclick="nav('tracker')" id="bn-tracker"><div class="bn-ic">📅</div>Tracker</button>
  <button class="bn" onclick="nav('cards')" id="bn-cards"><div class="bn-ic">🃏</div>Flashcards</button>
  <button class="bn" onclick="nav('tools')" id="bn-tools"><div class="bn-ic">🛠</div>Tools</button>
  <button class="bn" onclick="nav('settings')" id="bn-settings"><div class="bn-ic">⚙️</div>Settings</button>
</nav>

<!-- MODALS -->
<div class="ov" id="modal-main">
  <div class="modal">
    <div class="modal-bar"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
function ld(){try{return JSON.parse(localStorage.getItem('frb2v3')||'{}');}catch(e){return{};}}
function sv(){try{localStorage.setItem('frb2v3',JSON.stringify(S));}catch(e){alert('Storage full! Export your backup in Settings.');}}

let S=ld();
const def={
  decks:[],cards:[],sessions:[],
  wkHrs:{},wkChecks:{},openWeeks:{},
  milestones:{},
  writings:[],
  listeningLog:[],
  speakingLog:[],
  tefMocks:[],
  habits:{},
  gramNotes:{},
  journalEntries:[],
  settings:{name:'Om',targetDate:'2027-01-31',dailyGoal:22.5}
};
Object.keys(def).forEach(k=>{if(S[k]===undefined)S[k]=def[k];});

// ═══════════════════════════════════════════
// DATA — WEEKS
// ═══════════════════════════════════════════
const PHASES=[
  {id:1,name:"Foundation",dates:"May–Jul 2026",col:"green",weeks:[1,10]},
  {id:2,name:"Build B1",dates:"Aug–Sep 2026",col:"blue",weeks:[11,20]},
  {id:3,name:"Push B2",dates:"Oct–Nov 2026",col:"purple",weeks:[21,32]},
  {id:4,name:"TEF Prep",dates:"Dec 2026",col:"amber",weeks:[33,36]},

const GRAMMAR=[
  {id:"g1",cat:"Negation",title:"ne...pas / ne...jamais / ne...plus",rule:"Negation wraps around the conjugated verb. In spoken French, 'ne' is often dropped.",example:"Je ne parle pas français. / Je parle pas français (spoken).",note:"After negation, articles change: du/de la/des → de. Ex: Je n'ai pas de temps."},
  {id:"g2",cat:"Past tense",title:"Passé composé formula",rule:"avoir or être + past participle. Most verbs use avoir. Movement/state verbs use être (Dr Mrs Vandertramp). With être, participle agrees with subject.",example:"J'ai mangé une pomme. Elle est allée au bureau.",note:"Irregular participles: faire→fait, voir→vu, prendre→pris, être→été, avoir→eu, dire→dit, écrire→écrit."},
  {id:"g3",cat:"Past tense",title:"Imparfait vs Passé Composé",rule:"Passé composé = specific completed event. Imparfait = background description, habit, ongoing state.",example:"Il pleuvait (imparfait) quand je suis sorti (passé composé).",note:"Key imparfait signals: toujours, souvent, chaque jour, quand j'étais petit."},
  {id:"g4",cat:"Present",title:"-er verb conjugation",rule:"Remove -er, add: -e, -es, -e, -ons, -ez, -ent",example:"parler → je parle, tu parles, il parle, nous parlons, vous parlez, ils parlent.",note:"Applies to most French verbs. Verbs in -ir and -re have different patterns."},
  {id:"g5",cat:"Verbs",title:"être conjugation",rule:"Irregular. Must memorize.",example:"je suis, tu es, il/elle est, nous sommes, vous êtes, ils/elles sont.",note:"Used for identity, profession (no article!), descriptions. Ex: Je suis analyste. (not: Je suis UN analyste)"},
  {id:"g6",cat:"Verbs",title:"avoir conjugation",rule:"Irregular. Must memorize.",example:"j'ai, tu as, il/elle a, nous avons, vous avez, ils/elles ont.",note:"Used for possession, age (j'ai 24 ans), hunger/thirst/pain (j'ai faim, j'ai soif, j'ai mal)."},
  {id:"g7",cat:"Future",title:"Futur proche (near future)",rule:"aller (conjugated) + infinitive = going to do something",example:"Je vais étudier ce soir. Elle va partir demain.",note:"Most common way to express future in spoken French. More immediate than futur simple."},
  {id:"g8",cat:"Future",title:"Futur simple",rule:"Infinitive + endings: -ai, -as, -a, -ons, -ez, -ont (drop -e from -re verbs)",example:"Je parlerai français couramment. Tu viendras?",note:"Irregular stems: être→ser, avoir→aur, aller→ir, faire→fer, venir→viendr, voir→verr."},
  {id:"g9",cat:"Conditionals",title:"Si clauses (if...then)",rule:"Si + présent → futur simple (real possibility). Si + imparfait → conditionnel (hypothetical).",example:"Si je travaille bien, j'aurai une promotion. Si j'avais de l'argent, je voyagerais.",note:"Never use futur or conditionnel in the si clause itself."},
  {id:"g10",cat:"Relatives",title:"Relative pronouns: qui, que, dont",rule:"qui = subject of relative clause (who/that does). que = object (who/that receives). dont = of which/whose.",example:"L'homme qui parle. Le livre que je lis. Le sujet dont je parle.",note:"Qui is never shortened. Que becomes qu' before a vowel."},
  {id:"g11",cat:"Subjunctive",title:"Subjunctive triggers",rule:"Use subjunctive after: vouloir que, il faut que, bien que, pour que, à moins que, avant que.",example:"Il faut que tu études. Je veux qu'elle vienne.",note:"Subjunctive = uncertainty, desire, emotion, obligation. Regular subjunctive: stem from ils form + -e, -es, -e, -ions, -iez, -ent."},
  {id:"g12",cat:"Passive",title:"Passive voice",rule:"être (conjugated in any tense) + past participle (agrees with subject)",example:"Le rapport a été rédigé par l'équipe. La décision sera prise demain.",note:"The agent (doer) comes after 'par'. Common in formal writing and news."},
  {id:"g13",cat:"Articles",title:"Definite vs indefinite articles",rule:"le/la/l'/les (the). un/une/des (a/some). du/de la/de l'/des (some — partitive).",example:"Je mange une pomme. Je mange du pain. J'aime le pain.",note:"After negation: du/de la/des → de. After professions with être: no article needed."},
  {id:"g14",cat:"Linking words",title:"Essay transition words",rule:"Use these to structure TEF essays and make writing sound B2.",example:"D'une part... d'autre part. Certes... cependant. En effet. Par conséquent. Néanmoins.",note:"Memorize at least 10. Examiners specifically look for these in TEF writing."},

// ── SPACED REPETITION (SM-2) ─────────────────
function sm2(card,q){
  let{interval=1,repetitions=0,efactor=2.5}=card;
  if(q===0){repetitions=0;interval=1;}
  else if(q===1){interval=Math.max(1,Math.round(interval*1.2));}
  else{
    if(repetitions===0)interval=1;
    else if(repetitions===1)interval=6;
    else interval=Math.round(interval*efactor);
    repetitions++;
    efactor=Math.max(1.3,efactor+0.1-(3-q)*(0.08+(3-q)*0.02));
  }
  const nd=new Date();nd.setDate(nd.getDate()+interval);
  return{...card,interval,repetitions,efactor,due:nd.toISOString().split('T')[0],lastReviewed:new Date().toISOString()};
}
function intLbl(q,card){
  const{interval=1,efactor=2.5,repetitions=0}=card;
  if(q===0)return'<1d';if(q===1)return Math.max(1,Math.round(interval*1.2))+'d';
  if(repetitions===0)return'1d';if(repetitions===1)return'6d';
  return Math.round(interval*efactor)+'d';
}
function isDue(c){return !c.due||c.due<=today();}
function today(){return new Date().toISOString().split('T')[0];}

function totalHrs(){return Object.values(S.wkHrs).reduce((a,b)=>a+(parseFloat(b)||0),0);}
function curWeek(){const st=new Date('2026-05-17'),now=new Date(),d=Math.floor((now-st)/(7*864e5));return Math.max(1,Math.min(38,d+1));}
function phaseOf(w){return PHASES.find(p=>w>=p.weeks[0]&&w<=p.weeks[1])||PHASES[0];}
function wc(text){return text.trim().split(/\s+/).filter(w=>w.length>0).length;}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

function toggleHabit(key){
  S.habits[key]=!S.habits[key];sv();
  if(curPage==='home')rHome();
  if(curPage==='tools'&&document.getElementById('tool-habits'))rHabitTool();
}

function calcStreak(){
  const all=Object.keys(S.habits).filter(k=>S.habits[k]);
  const days=[...new Set(all.map(k=>k.split('_')[0]))].sort().reverse();
  let streak=0,d=new Date();
  for(const day of days){const t=d.toISOString().split('T')[0];if(day===t){streak++;d.setDate(d.getDate()-1);}else if(day<t)break;}
  return streak;
}

function renderWkList(){
  const cw=curWeek(),el=document.getElementById('wk-list');if(!el)return;
  let weeks=WEEKS;
  if(wkFilter==='current')weeks=WEEKS.filter(w=>w.w===cw);
  else if(wkFilter==='done')weeks=WEEKS.filter(w=>w.w<cw);
  else if(wkFilter==='phase1')weeks=WEEKS.filter(w=>w.p===1);
  else if(wkFilter==='phase2')weeks=WEEKS.filter(w=>w.p===2);
  else if(wkFilter==='phase3')weeks=WEEKS.filter(w=>w.p===3);
  else if(wkFilter==='phase4')weeks=WEEKS.filter(w=>w.p>=4);

  el.innerHTML=weeks.map(w=>{
    const status=w.w<cw?'done':w.w===cw?'current':'upcoming';
    const ph=phaseOf(w.w),col=PC[ph.col].c,bg=PC[ph.col].bg,br=PC[ph.col].br;
    const hrs=parseFloat(S.wkHrs[w.w]||0),pct=Math.min(100,Math.round(hrs/22.5*100));
    const isOpen=S.openWeeks[w.w];
    return`<div class="week-card ${status}">
      <div class="wk-hdr" onclick="toggleWk(${w.w},this)">
        <div class="wk-num" style="${status==='done'?`background:${bg};color:${col}`:status==='current'?'background:var(--blue-bg);color:var(--blue)':''}">${status==='done'?'✓':w.w}</div>
        <div class="wk-info">
          <div class="wk-title">Week ${w.w} — ${w.title}</div>
          <div class="wk-dates">${w.dates} · ${w.focus}</div>
          ${hrs>0?`<div class="pb-bg" style="margin-top:4px;"><div class="pb-f" style="width:${pct}%;background:${col}"></div></div>`:''}
        </div>
        <span class="wk-badge" style="background:${bg};color:${col}">${hrs>0?hrs.toFixed(1)+'h':'P'+w.p}</span>
        <span class="wk-chev ${isOpen?'open':''}">▼</span>
      </div>
      <div class="wk-body ${isOpen?'open':''}">
        <div class="hrs-slider">
          <label>Hrs:</label>
          <input type="range" min="0" max="25" step="0.5" value="${hrs}" oninput="lh(${w.w},this.value,this)">
          <span class="hrs-val" id="hd${w.w}">${hrs.toFixed(1)}</span>
          <span style="font-size:10px;color:var(--text3)">/22.5</span>
        </div>
        <div style="margin-bottom:8px;">
          ${w.days.map((d,i)=>{const k=`w${w.w}d${i}`,ch=S.wkChecks[k];return`<div class="day-row">
            <input type="checkbox" class="toggle" ${ch?'checked':''} onchange="S.wkChecks['${k}']=this.checked;sv()">
            <span class="day-nm">${d.n}</span>
            <span class="day-task">${d.t}</span>
            <span class="day-dur">${d.d}</span>
          </div>`;}).join('')}
        </div>
        <div class="chips">${w.mat.map(m=>`<span class="chip">${m}</span>`).join('')}</div>
        <div style="background:${bg};color:${col};border-radius:8px;padding:8px 10px;font-size:12px;margin-top:8px;"><strong>Goal:</strong> ${w.goal}</div>
        <button class="btn-s" style="margin-top:8px;font-size:11px;" onclick="quickWriting(${w.w})">+ Add writing entry</button>
      </div>
    </div>`;
  }).join('');
}

function toggleWk(n,hdr){S.openWeeks[n]=!S.openWeeks[n];sv();const b=hdr.nextElementSibling,c=hdr.querySelector('.wk-chev');b.classList.toggle('open',S.openWeeks[n]);c.classList.toggle('open',S.openWeeks[n]);}

function addCard(){

  if(!front||!back){alert('Add front and back.');return;}
  S.cards.push({id:Date.now(),deckId,front,back,cat,example:ex||'',interval:1,repetitions:0,efactor:2.5,due:today(),lastReviewed:null});
  sv();clearAF();
  const msg=document.getElementById('ac-msg');if(msg){msg.textContent='✓ Card added!';setTimeout(()=>msg.textContent='',2000);}
}
function clearAF(){['ac-front','ac-back','ac-ex'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}

function startStudy(deckId,all=false){
  let cards=deckId?S.cards.filter(c=>c.deckId===deckId):S.cards;
  if(!all)cards=cards.filter(isDue);
  if(!cards.length){alert('No cards due! Try "Study All" to review regardless of schedule.');return;}
  cards=[...cards].sort(()=>Math.random()-0.5);
  studyQ=cards.map(c=>c.id);studyIdx=0;studyFlipped=false;studyResults={again:0,hard:0,good:0,easy:0};
  renderStudyCard();
}

function renderStudyCard(){
  const pg=document.getElementById('pg-cards');
  if(studyIdx>=studyQ.length){renderStudyDone();return;}
  const card=S.cards.find(c=>c.id===studyQ[studyIdx]);
  if(!card){studyIdx++;renderStudyCard();return;}
  const pct=Math.round(studyIdx/studyQ.length*100);
  studyFlipped=false;
  pg.innerHTML=`
    <div style="padding:12px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <button class="btn-s" style="font-size:11px;padding:5px 10px;" onclick="rCards()">✕ Exit</button>
        <span style="font-size:11px;color:var(--text3)">${studyIdx+1} / ${studyQ.length}</span>
        <span style="font-size:11px;color:var(--rose)">❌${studyResults.again} <span style="color:var(--amber)">😓${studyResults.hard}</span> <span style="color:var(--blue)">✓${studyResults.good}</span> <span style="color:var(--green)">⚡${studyResults.easy}</span></span>
      </div>
      <div class="pb-bg" style="margin-bottom:16px;"><div class="pb-f" style="width:${pct}%"></div></div>
      <div class="fc-wrap" onclick="flipFC()">
        <div class="fc-inner" id="fci">
          <div class="fc-face fc-front">
            <div class="fc-hint">French — tap to reveal</div>
            <div class="fc-word">${card.front}</div>
            ${card.cat?`<span class="badge" style="background:var(--bg3);color:var(--text3);margin-top:8px;">${card.cat}</span>`:''}
            <div class="fc-tap">Tap card to flip</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-hint">Answer</div>
            <div class="fc-ans">${card.back}</div>
            ${card.example?`<div class="fc-ex">"${card.example}"</div>`:''}
          </div>
        </div>
      </div>
      <div id="pre-flip" style="text-align:center;margin-bottom:12px;">
        <button class="btn-s btn-full" onclick="flipFC()">Show Answer</button>
      </div>
      <div class="rating-grid" id="rating-row" style="display:none;">
        ${[['❌','Again','rb-again',0],['😓','Hard','rb-hard',1],['✓','Good','rb-good',2],['⚡','Easy','rb-easy',3]].map(([ic,lbl,cls,q])=>`
          <button class="rb ${cls}" onclick="rateCard(${q})">
            <div class="rb-lbl">${ic} ${lbl}</div>
            <div class="rb-int">${intLbl(q,card)}</div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function flipFC(){
  const inner=document.getElementById('fci'),rating=document.getElementById('rating-row'),pre=document.getElementById('pre-flip');
  if(!inner)return;
  inner.classList.toggle('flipped');studyFlipped=!studyFlipped;
  if(studyFlipped){if(rating)rating.style.display='grid';if(pre)pre.style.display='none';}
}

function rateCard(q){
  const ci=S.cards.findIndex(c=>c.id===studyQ[studyIdx]);
  if(ci>=0)S.cards[ci]=sm2(S.cards[ci],q);
  const lb=['again','hard','good','easy'];studyResults[lb[q]]++;
  studyIdx++;studyFlipped=false;
  S.sessions.push({date:today(),cardId:studyQ[studyIdx-1],quality:q,ts:Date.now()});
  sv();renderStudyCard();
}

function renderStudyDone(){
  const pg=document.getElementById('pg-cards'),total=studyQ.length,score=Math.round((studyResults.good+studyResults.easy)/total*100);
  pg.innerHTML=`
    <div style="text-align:center;padding:40px 16px;">

}

// ── TEF MOCK SCORER ───────────────────────
const TEF_BANDS=[
  {min:0,max:3,level:'A1',col:'var(--text3)'},{min:4,max:5,level:'A2',col:'var(--text2)'},
  {min:6,max:7,level:'B1',col:'var(--blue)'},{min:8,max:9,level:'B2',col:'var(--green)'},
  {min:10,max:11,level:'C1',col:'var(--purple)'},{min:12,max:12,level:'C2',col:'var(--rose)'},
];
function tefLevel(score){return TEF_BANDS.find(b=>score>=b.min&&score<=b.max)||TEF_BANDS[0];}

function rTEFTool(){
  const el=document.getElementById('pg-tools');
  el.innerHTML=`
    <div class="hdr" style="position:relative;top:0;margin:-16px -16px 16px;padding:12px 16px;">

      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;">Enter your score for each section (out of 12). B2 = score 8–9 per section.</div>
      <div class="fgrid2">
        ${['Listening','Reading','Writing','Oral'].map(s=>`
          <div class="fg">
            <label class="flbl">${s} (0–12)</label>

          </div>
        `).join('')}
      </div>
      <div class="fg"><label class="flbl">Date of mock</label><input type="date" class="fi" id="tef-date" value="${today()}"></div>
      <div class="fg"><label class="flbl">Notes</label><input type="text" class="fi" id="tef-notes" placeholder="e.g. Struggled with fast listening, writing good"></div>
      <div class="btn-row"><button class="btn-g" onclick="saveTEF()">Save Result</button></div>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--text2);">
      <div style="font-weight:700;color:var(--text);margin-bottom:4px;">TEF Canada score bands:</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${TEF_BANDS.map(b=>`<span style="padding:2px 8px;border-radius:4px;background:var(--bg4);color:${b.col};font-size:10px;font-weight:600;">${b.level}: ${b.min}–${b.max}/12</span>`).join('')}
      </div>
    </div>
    <div class="sec">Mock Results (${S.tefMocks.length})</div>
    ${S.tefMocks.length?`
      <div class="score-history">
        <table class="score-table">
          <thead><tr><th>Date</th><th>Listen</th><th>Read</th><th>Write</th><th>Oral</th><th>Avg</th></tr></thead>
          <tbody>
            ${[...S.tefMocks].sort((a,b)=>b.ts-a.ts).map(m=>{
              const avg=((m.listening+m.reading+m.writing+m.oral)/4).toFixed(1);
              const avgLvl=tefLevel(Math.round(parseFloat(avg)));
              return`<tr>
                <td style="color:var(--text);font-size:11px;">${fmtDate(m.ts)}</td>
                ${['listening','reading','writing','oral'].map(s=>{const lvl=tefLevel(m[s]);return`<td style="color:${lvl.col};font-weight:700;">${m[s]}<span style="font-size:9px;color:var(--text3)"> ${lvl.level}</span></td>`;}).join('')}
                <td style="color:${avgLvl.col};font-weight:800;">${avg}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `:'<div class="empty"><div class="empty-ic">📊</div><div class="empty-txt">No mocks logged yet</div></div>'}
  `;
}
function saveTEF(){
  const listening=parseInt(document.getElementById('tef-listening')?.value||0),reading=parseInt(document.getElementById('tef-reading')?.value||0),writing=parseInt(document.getElementById('tef-writing')?.value||0),oral=parseInt(document.getElementById('tef-oral')?.value||0),date=document.getElementById('tef-date')?.value,notes=document.getElementById('tef-notes')?.value.trim();
  if([listening,reading,writing,oral].some(s=>isNaN(s)||s<0||s>12)){alert('Enter valid scores (0–12).');return;}
  S.tefMocks.unshift({id:Date.now(),ts:date?new Date(date).getTime():Date.now(),listening,reading,writing,oral,notes});
  sv();rTEFTool();
}

    <div class="hdr" style="position:relative;top:0;margin:-16px -16px 16px;padding:12px 16px;">
      <div><div class="hdr-title">⚙️ Grammar Reference</div><div class="hdr-sub">Tap any rule to expand</div></div>
      <button class="btn-s" style="font-size:11px;" onclick="showTool('menu')">← Back</button>
    </div>
    <div class="search-box">
      <span class="search-ic">🔍</span>
      <input type="text" placeholder="Search grammar..." value="${gramSearch}" oninput="gramSearch=this.value;renderGram()">
    </div>
    <div id="gram-list"></div>
  `;
  renderGram();
}

function renderGram(){
  const el=document.getElementById('gram-list');if(!el)return;
  const q=gramSearch.toLowerCase();
  const items=GRAMMAR.filter(g=>!q||(g.title+g.rule+g.example+g.cat).toLowerCase().includes(q));
  el.innerHTML=items.map(g=>`
    <div class="gram-item${g._open?' open':''}" onclick="toggleGram('${g.id}',this)">
      <div class="gram-title">${g.title}<span class="gram-cat">${g.cat}</span></div>
      <div class="gram-body">
        <div class="gram-rule">${g.rule}</div>
        <div class="gram-example">${g.example}</div>
        <div class="gram-note">💡 ${g.note}</div>
        <div class="fg" style="margin-top:10px;">
          <label class="flbl">My notes</label>
          <input type="text" class="fi" style="font-size:12px;" placeholder="Add your own note..." value="${S.gramNotes[g.id]||''}" oninput="S.gramNotes['${g.id}']=this.value;sv()" onclick="event.stopPropagation()">
        </div>
      </div>
    </div>
  `).join('')||'<div class="empty"><div class="empty-ic">🔍</div><div class="empty-txt">No matches</div></div>';
}

function toggleGram(id,el){el.classList.toggle('open');const g=GRAMMAR.find(x=>x.id===id);if(g)g._open=el.classList.contains('open');}

// ── MILESTONES ────────────────────────────
function rMilestoneTool(){
  const done=MILESTONES.filter(m=>S.milestones[m.id]).length;
  document.getElementById('pg-tools').innerHTML=`
    <div class="hdr" style="position:relative;top:0;margin:-16px -16px 16px;padding:12px 16px;">
      <div><div class="hdr-title">🏁 Milestones</div><div class="hdr-sub">${done} / ${MILESTONES.length} reached</div></div>
      <button class="btn-s" style="font-size:11px;" onclick="showTool('menu')">← Back</button>
    </div>
    <div class="sgrid s2" style="margin-bottom:12px;">
      <div class="sc"><div class="sv" style="color:var(--green)">${done}</div><div class="sl">Reached</div></div>
      <div class="sc"><div class="sv" style="color:var(--text3)">${MILESTONES.length-done}</div><div class="sl">Remaining</div></div>
    </div>
    ${MILESTONES.map(m=>{
      const reached=S.milestones[m.id];
      return`<div class="list-item" style="border-color:${reached?'var(--green-br)':'var(--border)'};" onclick="toggleMS('${m.id}')">
        <div style="width:22px;height:22px;border-radius:50%;background:${reached?'var(--green)':'transparent'};border:2px solid ${reached?'var(--green)':'var(--border2)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#000;font-size:12px;">${reached?'✓':''}</div>
        <div class="li-main">
          <div class="li-title" style="color:${reached?'var(--green)':'var(--text)'}">${m.label}</div>
          <div class="li-sub">${m.desc} · ${m.date}</div>
        </div>
      </div>`;
    }).join('')}
  `;
}
function toggleMS(id){S.milestones[id]=!S.milestones[id];sv();rMilestoneTool();}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function rSettings(){
  document.getElementById('pg-settings').innerHTML=`
    <div class="hdr" style="position:relative;top:0;margin:-16px -16px 16px;padding:12px 16px;">
      <div class="hdr-title">⚙️ Settings</div>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:12px;">Your Profile</div>
      <div class="fg"><label class="flbl">Your name</label><input type="text" class="fi" id="set-name" value="${S.settings.name||''}" placeholder="e.g. Om"></div>
      <div class="fg"><label class="flbl">TEF exam target date</label><input type="date" class="fi" id="set-date" value="${S.settings.targetDate||''}"></div>
      <div class="fg"><label class="flbl">Weekly hour goal</label><input type="number" class="fi" id="set-hrs" value="${S.settings.dailyGoal||22.5}" step="0.5" min="5" max="50"></div>
      <div class="btn-row"><button class="btn-g" onclick="saveSettings()">Save</button></div>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:12px;">Your Stats</div>
      <div style="display:grid;gap:6px;font-size:13px;">
        ${[['Total hours logged',totalHrs().toFixed(1)+' hrs'],['Flashcards total',S.cards.length],['Flashcards mastered',S.cards.filter(c=>c.repetitions>=5).length],['Writing entries',S.writings.length],['Listening sessions',S.listeningLog.length],['Speaking sessions',S.speakingLog.length],['TEF mocks done',S.tefMocks.length],['Milestones reached',MILESTONES.filter(m=>S.milestones[m.id]).length+' / '+MILESTONES.length]].map(([l,v])=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--text2);">${l}</span><span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--text);">${v}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:6px;">Data Backup</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">Export your data as a JSON backup. Import it on any device to restore everything.</div>
      <div class="btn-row">
        <button class="btn-g" onclick="exportData()">⬇ Export Backup</button>
        <button class="btn-s" onclick="document.getElementById('imp-inp').click()">⬆ Import Backup</button>
        <input type="file" id="imp-inp" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
    <div class="card">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--rose);margin-bottom:6px;">Danger Zone</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">Reset all data including cards, logs, and progress. Cannot be undone.</div>
      <button class="btn-r" onclick="resetAll()">⚠ Reset Everything</button>
    </div>
    <div style="text-align:center;padding:20px;font-size:11px;color:var(--text3);">
      Français B2 — TEF Canada 2027<br>All data stored locally on this device
    </div>
  `;
}

function saveSettings(){
  S.settings.name=document.getElementById('set-name')?.value.trim();
  S.settings.targetDate=document.getElementById('set-date')?.value;
  S.settings.dailyGoal=parseFloat(document.getElementById('set-hrs')?.value)||22.5;
  sv();alert('Settings saved!');
}

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='francais-b2-backup-'+today()+'.json';a.click();
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);S={...def,...d};sv();alert('Imported! '+S.cards.length+' cards loaded.');nav('home');}
    catch(err){alert('Invalid backup file.');}
  };r.readAsText(file);
}

function resetAll(){
  if(!confirm('Reset ALL data? This cannot be undone.'))return;
  if(!confirm('Are you sure? Everything will be deleted.'))return;
  localStorage.removeItem('frb2v3');S={...def,decks:[],cards:[],sessions:[]};initStarter();nav('home');
}

// ═══════════════════════════════════════════
// ADD TO HOME SCREEN PROMPT
// ═══════════════════════════════════════════
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window._a2hs=e;});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
initStarter();
rHome();
</script>
</body>
</html>
